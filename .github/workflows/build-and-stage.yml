name: Build and push image to the registry

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write
  actions: write

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build_and_push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orders-api
        id: orders
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orders-service/Dockerfile
          target: prod-distroless
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orders-api:${{ env.IMAGE_TAG }}

      - name: Build and push payments
        id: payments
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/payments-service/Dockerfile
          target: prod
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/payments:${{ env.IMAGE_TAG }}

      - name: Write release-manifest.json
        env:
          ORDERS_DIGEST: ${{ steps.orders.outputs.digest }}
          PAYMENTS_DIGEST: ${{ steps.payments.outputs.digest }}
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg tag "${{ env.IMAGE_TAG }}" \
            --arg owner "${{ env.OWNER_LC }}" \
            --arg od "$ORDERS_DIGEST" \
            --arg pd "$PAYMENTS_DIGEST" \
            '{
              commit: $commit,
              services: {
                "orders-api": {
                  image: ("ghcr.io/" + $owner + "/orders-api:" + $tag),
                  digest: $od
                },
                payments: {
                  image: ("ghcr.io/" + $owner + "/payments:" + $tag),
                  digest: $pd
                }
              }
            }' > release-manifest.json
          cat release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy_stage:
    name: Deploy to stage
    runs-on: self-hosted
    needs: build_and_push

    environment:
      name: stage
      url: http://localhost:8080

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .

      - name: Check manifest
        run: |
          ls -la
          cat release-manifest.json

      - name: Read manifest
        run: |
          echo 'ORDERS_IMAGE<<EOF' >> $GITHUB_ENV
          jq -r '.services["orders-api"].image' release-manifest.json >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

          echo 'PAYMENTS_IMAGE<<EOF' >> $GITHUB_ENV
          jq -r '.services["payments"].image' release-manifest.json >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: Write stage env file
        run: |
          mkdir -p deploy
          cat > deploy/.env.stage <<'EOF'
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=orders

          PAYMENTS_DB_USER=postgres
          PAYMENTS_DB_PASSWORD=postgres
          PAYMENTS_DB_NAME=payments
          JWT_SECRET=supersecret

          RABBIT_USER=guest
          RABBIT_PASSWORD=guest

          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin

          MINIO_API_PORT=9000
          MINIO_CONSOLE_PORT=9001

          PAYMENTS_GRPC_PORT=50051
          PORT=8080
          EOF

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy stage stack
        run: |
          export ORDERS_IMAGE="${ORDERS_IMAGE}"
          export PAYMENTS_IMAGE="${PAYMENTS_IMAGE}"

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            pull

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            down --remove-orphans

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            up -d

      - name: Show running containers
        run: docker ps

      - name: Post-deploy health check
        run: |
          curl --fail --retry 10 --retry-delay 5 http://localhost:8080/health
