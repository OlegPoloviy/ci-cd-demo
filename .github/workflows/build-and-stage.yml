name: Build and push image to the registry

on:
  push:
    branches: [develop]

permissions:
  contents: read
  packages: write
  actions: write

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build_and_push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orders-api
        id: orders
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/orders-service/Dockerfile
          target: prod-distroless
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orders-api:${{ env.IMAGE_TAG }}

      - name: Build and push payments
        id: payments
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/payments-service/Dockerfile
          target: prod
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/payments:${{ env.IMAGE_TAG }}

      - name: Write release-manifest.json
        env:
          ORDERS_DIGEST: ${{ steps.orders.outputs.digest }}
          PAYMENTS_DIGEST: ${{ steps.payments.outputs.digest }}
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg tag "${{ env.IMAGE_TAG }}" \
            --arg owner "${{ env.OWNER_LC }}" \
            --arg od "$ORDERS_DIGEST" \
            --arg pd "$PAYMENTS_DIGEST" \
            '{
              commit: $commit,
              image_tag: $tag,
              services: {
                "orders-api": {
                  image: ("ghcr.io/" + $owner + "/orders-api:" + $tag),
                  digest: $od
                },
                payments: {
                  image: ("ghcr.io/" + $owner + "/payments:" + $tag),
                  digest: $pd
                }
              }
            }' > release-manifest.json
          cat release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json

  deploy_stage:
    name: Deploy to stage
    if: github.ref == 'refs/heads/develop'
    runs-on: self-hosted
    needs: build_and_push

    environment:
      name: stage
      url: http://localhost:8080

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .

      - name: Check manifest
        run: |
          ls -la
          cat release-manifest.json

      - name: Read manifest
        run: |
          echo 'ORDERS_IMAGE<<EOF' >> $GITHUB_ENV
          jq -r '.services["orders-api"].image' release-manifest.json >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

          echo 'PAYMENTS_IMAGE<<EOF' >> $GITHUB_ENV
          jq -r '.services["payments"].image' release-manifest.json >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: Write deploy/.env.stage from Environment secrets
        working-directory: ${{ github.workspace }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          PAYMENTS_GRPC_PORT: ${{ secrets.PAYMENTS_GRPC_PORT }}
          PAYMENTS_GRPC_TIMEOUT_MS: ${{ secrets.PAYMENTS_GRPC_TIMEOUT_MS }}
          PAYMENTS_GRPC_BIND_URL: ${{ secrets.PAYMENTS_GRPC_BIND_URL }}
          DB_HOST_PORT: ${{ secrets.DB_HOST_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          AWS_ENDPOINT: ${{ secrets.AWS_ENDPOINT }}
          CLOUDFRONT_BASE_URL: ${{ secrets.CLOUDFRONT_BASE_URL }}
          RABBIT_USER: ${{ secrets.RABBIT_USER }}
          RABBIT_PASSWORD: ${{ secrets.RABBIT_PASSWORD }}
          RABBITMQ_PREFETCH: ${{ secrets.RABBITMQ_PREFETCH }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          RABBIT_QUEUE_ORDERS: ${{ secrets.RABBIT_QUEUE_ORDERS }}
          RABBIT_QUEUE_DLQ: ${{ secrets.RABBIT_QUEUE_DLQ }}
          RABBIT_RETRY_COUNT: ${{ secrets.RABBIT_RETRY_COUNT }}
          RABBIT_RETRY_DELAY: ${{ secrets.RABBIT_RETRY_DELAY }}
          PAYMENTS_DB_HOST: ${{ secrets.PAYMENTS_DB_HOST }}
          PAYMENTS_DB_PORT: ${{ secrets.PAYMENTS_DB_PORT }}
          PAYMENTS_DB_USER: ${{ secrets.PAYMENTS_DB_USER }}
          PAYMENTS_DB_PASSWORD: ${{ secrets.PAYMENTS_DB_PASSWORD }}
          PAYMENTS_DB_NAME: ${{ secrets.PAYMENTS_DB_NAME }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MINIO_API_PORT: ${{ secrets.MINIO_API_PORT }}
          MINIO_CONSOLE_PORT: ${{ secrets.MINIO_CONSOLE_PORT }}
          PORT: ${{ secrets.PORT }}
        run: |
          set -euo pipefail
          mkdir -p deploy
          python3 <<'PY'
          import os
          keys = [
              "DB_HOST", "DB_PORT", "PAYMENTS_GRPC_PORT", "PAYMENTS_GRPC_TIMEOUT_MS",
              "PAYMENTS_GRPC_BIND_URL", "DB_HOST_PORT", "DB_USER", "DB_PASSWORD", "DB_NAME",
              "JWT_SECRET", "JWT_EXPIRES_IN", "AWS_REGION", "AWS_ACCESS_KEY_ID",
              "AWS_SECRET_ACCESS_KEY", "AWS_BUCKET", "AWS_ENDPOINT", "CLOUDFRONT_BASE_URL",
              "RABBIT_USER", "RABBIT_PASSWORD", "RABBITMQ_PREFETCH", "RABBITMQ_URL",
              "RABBIT_QUEUE_ORDERS", "RABBIT_QUEUE_DLQ", "RABBIT_RETRY_COUNT", "RABBIT_RETRY_DELAY",
              "PAYMENTS_DB_HOST", "PAYMENTS_DB_PORT", "PAYMENTS_DB_USER", "PAYMENTS_DB_PASSWORD",
              "PAYMENTS_DB_NAME", "MINIO_ROOT_USER", "MINIO_ROOT_PASSWORD", "MINIO_API_PORT",
              "MINIO_CONSOLE_PORT", "PORT",
          ]
          path = os.path.join("deploy", ".env.stage")
          with open(path, "w", encoding="utf-8") as f:
              for k in keys:
                  f.write(f"{k}={os.environ.get(k, '')}\n")
          st = os.stat(path)
          print(f"Wrote {path} ({st.st_size} bytes)")
          if st.st_size == 0:
              raise SystemExit("deploy/.env.stage is empty")
          PY
          test -f deploy/.env.stage
          ls -la deploy/.env.stage

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy stage stack
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          test -f deploy/.env.stage
          export ORDERS_IMAGE="${ORDERS_IMAGE}"
          export PAYMENTS_IMAGE="${PAYMENTS_IMAGE}"

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            pull

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            down --remove-orphans

          docker-compose \
            -p myapp-stage \
            --env-file deploy/.env.stage \
            -f deploy/compose.stage.yml \
            up -d

      - name: Show running containers
        run: docker ps

      - name: Post-deploy health check
        run: |
          for i in {1..20}; do
            if curl --fail http://localhost:8080/health; then
              exit 0
            fi
            echo "Health check failed, retry $i/20"
            sleep 3
          done
          echo "Service did not become healthy in time"
          docker ps
          docker logs myapp-stage_orders-api_1 --tail 200 || true
          exit 1
