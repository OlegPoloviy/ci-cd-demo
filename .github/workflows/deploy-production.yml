name: Deploy production

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of successful develop build to deploy'
        required: true

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy_production:
    name: Deploy to production
    runs-on: [self-hosted, prod]

    environment:
      name: production
      url: http://localhost:8081

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download release manifest from selected run
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: .
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read manifest, print metadata, and write env file
        shell: bash
        run: |
          set -euo pipefail

          test -f release-manifest.json

          ORDERS_IMAGE=$(jq -r '.services["orders-api"].image' release-manifest.json)
          PAYMENTS_IMAGE=$(jq -r '.services["payments"].image' release-manifest.json)
          IMAGE_TAG=$(jq -r '.image_tag // empty' release-manifest.json)
          COMMIT_SHA=$(jq -r '.commit' release-manifest.json)
          ORDERS_DIGEST=$(jq -r '.services["orders-api"].digest' release-manifest.json)
          PAYMENTS_DIGEST=$(jq -r '.services["payments"].digest' release-manifest.json)

          test -n "$ORDERS_IMAGE"
          test -n "$PAYMENTS_IMAGE"

          echo "=== PRODUCTION DEPLOY ==="
          echo "Target environment: production"
          echo "Source workflow run id: ${{ inputs.run_id }}"
          echo "Commit SHA: $COMMIT_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Orders image: $ORDERS_IMAGE"
          echo "Orders digest: $ORDERS_DIGEST"
          echo "Payments image: $PAYMENTS_IMAGE"
          echo "Payments digest: $PAYMENTS_DIGEST"

          cat > deploy/.env.production <<EOF
          ORDERS_IMAGE=$ORDERS_IMAGE
          PAYMENTS_IMAGE=$PAYMENTS_IMAGE

          NODE_ENV=production

          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}

          RABBIT_USER=${{ secrets.RABBIT_USER }}
          RABBIT_PASSWORD=${{ secrets.RABBIT_PASSWORD }}

          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}

          PAYMENTS_DB_USER=${{ secrets.PAYMENTS_DB_USER }}
          PAYMENTS_DB_PASSWORD=${{ secrets.PAYMENTS_DB_PASSWORD }}
          PAYMENTS_DB_NAME=${{ secrets.PAYMENTS_DB_NAME }}

          JWT_SECRET=${{ secrets.JWT_SECRET }}

          PORT=${{ vars.PORT }}
          PAYMENTS_GRPC_PORT=${{ vars.PAYMENTS_GRPC_PORT }}
          MINIO_API_PORT=${{ vars.MINIO_API_PORT }}
          MINIO_CONSOLE_PORT=${{ vars.MINIO_CONSOLE_PORT }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET=${{ secrets.AWS_BUCKET }}
          AWS_ENDPOINT=${{ secrets.AWS_ENDPOINT }}
          CLOUDFRONT_BASE_URL=${{ secrets.CLOUDFRONT_BASE_URL }}
          EOF

      - name: Preview env file safely
        run: |
          grep -E '^[A-Z0-9_]+=' deploy/.env.production | sed 's/=.*/=***/'

      - name: Debug rendered compose
        run: |
          echo "----- image refs from env file -----"
          grep '^ORDERS_IMAGE=' deploy/.env.production
          grep '^PAYMENTS_IMAGE=' deploy/.env.production
          echo "----- rendered compose -----"
          docker-compose --env-file deploy/.env.production -f deploy/compose.prod.yml config

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull production images
        run: |
          docker-compose \
            -p myapp-prod \
            --env-file deploy/.env.production \
            -f deploy/compose.prod.yml \
            pull

      - name: Recreate production stack
        run: |
          docker-compose \
            -p myapp-prod \
            --env-file deploy/.env.production \
            -f deploy/compose.prod.yml \
            down --remove-orphans

          docker-compose \
            -p myapp-prod \
            --env-file deploy/.env.production \
            -f deploy/compose.prod.yml \
            up -d

      - name: Show running containers
        run: docker ps

      - name: Production health check
        shell: bash
        run: |
          for i in {1..20}; do
            if curl --fail --silent --show-error http://localhost:8081/health; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Waiting for production service... attempt $i/20"
            sleep 3
          done

          echo "Production health check failed"
          docker ps
          docker logs myapp-prod_orders-api_1 --tail 200 || true
          exit 1
